name: Bump Version and Tag on PR Merge

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Get current version from pom.xml
        run: |
          version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "current_version=$version" >> $GITHUB_ENV

      - name: Bump patch version
        run: |
          IFS='.' read -r major minor patch <<< "${{ env.current_version }}"
          patch=$((patch + 1))
          new_version="${major}.${minor}.${patch}"
          mvn versions:set -DnewVersion=$new_version -q
          mvn versions:commit -q
          echo "new_version=$new_version" >> $GITHUB_ENV

      - name: Commit new version and tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "chore: bump version to ${{ env.new_version }}"
          git push origin main
          TAG="v${{ env.new_version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
          echo "✅ Tagged $TAG — JitPack will serve this version on first request."
